<!-- Giscus comment system -->
{% if site.comments.active == "giscus" and page.comments != false %}

<style>
  /* Make Giscus blend with Chirpy dark theme */
  .giscus, .giscus-frame, .giscus-frame-wrapper {
    width: 100% !important;
  }
  .giscus .giscus-button, 
  .giscus-btn-sign-in,
  button.giscus-button {
    background-color: #2d2d3d !important;
    border-color: #404050 !important;
    color: #e0e0e0 !important;
  }
  button.giscus-button:hover {
    background-color: #3d3d4d !important;
  }
</style>

<section id="giscus-comment">
  <script src="https://giscus.app/client.js"
          data-repo="kiefeng/kiefeng.github.io"
          data-repo-id="R_kgDOTLRHHQ"
          data-category="Announcements"
          data-category-id="DIC_kwDOTLRHHc4DAZXQ"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="transparent_dark"
          data-lang="zh-CN"
          crossorigin="anonymous"
          async>
  </script>
  <noscript>请启用 JavaScript 来查看评论。</noscript>
</section>

{% endif %}
