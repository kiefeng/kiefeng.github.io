title: "Kieran"
tagline: "医学 · 音乐 · 阅读 · 思考"
description: "Kieran的个人空间。制药行业从业者，偶尔写写医学、音乐、阅读和思考。"
url: "https://kiefeng.github.io"
baseurl: ""
github:
  username: kiefeng
social:
  name: Kieran
  email: yafc18992173463@gmail.com
  links:
    - https://github.com/kiefeng
theme: jekyll-theme-chirpy
lang: zh-CN
timezone: Asia/Shanghai
avatar: "https://avatars.githubusercontent.com/u/102287897?v=4"
theme_mode: dark
theme_color: blue
comments:
  active: waline
  waline:
    serverURL: "https://YOUR_VERCEL_APP.vercel.app" # 替换为你的 Waline 后端地址
paginate: 10
collections:
  tabs:
    output: true
    sort_by: order
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
